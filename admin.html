<!DOCTYPE html>
<html lang="th">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการ - สหกรณ์การเกษตร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .truncate-2-lines { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
    </style>
</head>
<body class="bg-gray-100 p-4 lg:p-6 min-h-screen pb-40"> 
    
    <script>const API_URL = "วาง_URL_WEB_APP_ตรงนี้";</script>

    <div class="max-w-7xl mx-auto no-print">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <i class="fas fa-seedling text-green-600"></i> ระบบจัดการหลังบ้าน
                </h1>
                <p class="text-sm text-gray-500">สหกรณ์การเกษตรชุมพลบุรี จำกัด</p>
            </div>
            <div class="bg-white p-1 rounded-lg shadow-sm border border-gray-200 flex">
                <button onclick="switchTab('orders')" id="tab-orders" class="px-6 py-2 rounded-md text-sm font-bold transition-all bg-green-600 text-white shadow">
                    <i class="fas fa-file-invoice-dollar mr-1"></i> รายการขาย
                </button>
                <button onclick="switchTab('products')" id="tab-products" class="px-6 py-2 rounded-md text-sm font-bold transition-all text-gray-600 hover:bg-gray-50">
                    <i class="fas fa-boxes mr-1"></i> คลังสินค้า
                </button>
            </div>
        </div>

        <div id="view-orders" class="space-y-6">
            <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 flex flex-wrap gap-3 items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded border border-gray-200">
                        <span class="text-sm text-gray-600"><i class="far fa-calendar-alt"></i> วันที่:</span>
                        <input type="date" id="filterDate" onchange="filterOrders()" class="bg-transparent text-sm focus:outline-none text-gray-700">
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="loadOrders()" class="bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-700 transition text-sm flex items-center gap-1 shadow">
                        <i class="fas fa-sync-alt"></i> รีเฟรช
                    </button>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow overflow-hidden border border-gray-200">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase">Order Info</th>
                                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase">ลูกค้า</th>
                                <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase">รายการ</th>
                                <th class="px-4 py-3 text-right text-xs font-bold text-gray-500 uppercase">ยอดรวม</th>
                                <th class="px-4 py-3 text-center text-xs font-bold text-gray-500 uppercase">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="orderTableBody" class="bg-white divide-y divide-gray-200">
                            <tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">กำลังโหลด...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-products" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-white p-3 rounded-lg shadow-sm border border-gray-200">
                <h2 class="font-bold text-gray-700 ml-2 border-l-4 border-green-500 pl-2">รายการสินค้าทั้งหมด</h2>
                <div class="flex gap-2">
                    <button onclick="openProductModal()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 font-bold shadow flex items-center gap-2 text-sm">
                        <i class="fas fa-plus"></i> เพิ่มสินค้า
                    </button>
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4" id="productGrid"></div>
        </div>
    </div>

    <script>
        let allOrders = [];
        let allProducts = [];

        function switchTab(tab) {
            document.getElementById('view-orders').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('view-products').classList.toggle('hidden', tab !== 'products');
            if(tab === 'products') loadProducts();
        }

        async function fetchAPI(action, data = {}) {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action, ...data })
            });
            return await response.json();
        }

        async function loadOrders() {
            document.getElementById('orderTableBody').innerHTML = '<tr><td colspan="5" class="text-center py-10">กำลังโหลด...</td></tr>';
            const orders = await fetchAPI('getOrders');
            allOrders = orders;
            renderOrders(orders);
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('orderTableBody');
            tbody.innerHTML = '';
            orders.forEach(row => {
                let id=row[0], name=row[3], phone=row[4], items=JSON.parse(row[6] || "[]"), total=row[7], status=row[9], slip=row[8];
                tbody.innerHTML += `
                    <tr>
                        <td class="px-4 py-4 text-xs">${row[1]}<br><span class="font-bold">${id}</span></td>
                        <td class="px-4 py-4 text-sm">${name}<br>${phone}</td>
                        <td class="px-4 py-4 text-xs">${items.map(i=>`${i.name} x${i.qty}`).join('<br>')}</td>
                        <td class="px-4 py-4 text-right font-bold text-green-700">฿${Number(total).toLocaleString()}</td>
                        <td class="px-4 py-4 text-center">
                            <select onchange="updateStatus('${id}', this.value)" class="text-xs p-1 border rounded">
                                <option ${status==='รอยืนยัน'?'selected':''}>รอยืนยัน</option>
                                <option ${status==='จัดส่งแล้ว'?'selected':''}>จัดส่งแล้ว</option>
                            </select>
                        </td>
                    </tr>`;
            });
        }

        async function updateStatus(orderId, newStatus) {
            await fetchAPI('updateOrderStatus', { orderId, newStatus });
            alert('อัปเดตสถานะสำเร็จ');
        }

        async function loadProducts() {
            const products = await fetchAPI('getProductsAdmin');
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded shadow border">
                    <img src="${p.image}" class="h-32 w-full object-cover mb-2 rounded">
                    <h3 class="font-bold text-sm">${p.name}</h3>
                    <p class="text-green-600 font-bold">฿${p.price}</p>
                    <button onclick='deleteProduct("${p.id}")' class="text-red-500 text-xs mt-2 underline">ลบสินค้า</button>
                </div>
            `).join('');
        }

        async function deleteProduct(id) {
            if(confirm('ลบสินค้านี้?')) {
                await fetchAPI('deleteProduct', { id });
                loadProducts();
            }
        }

        loadOrders();
    </script>
</body>
</html>
